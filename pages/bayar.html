<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Konfirmasi Pembayaran | GIVASTORE.ID</title>
  <meta name="description" content="Konfirmasi dan detail pesanan Anda">
  <link rel="icon" href="../image/logo.jpg" type="image/jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* ==================== DESIGN SYSTEM (SAMA DENGAN INDEX.HTML) ==================== */
    :root {
      --blue: #2563EB;
      --blue-dark: #1D4ED8;
      --blue-light: #DBEAFE;
      --primary: #1E293B;
      --accent: #2563EB;
      --accent-light: #DBEAFE;
      --accent-alt: #1D4ED8;
      --text-dark: #1E293B;
      --text: #334155;
      --text-light: #64748B;
      --light: #FFFFFF;
      --light-gray: #F1F5F9;
      --gray: #E2E8F0;
      --border: #1E293B;
      --shadow: 4px 4px 0px var(--border);
      --shadow-sm: 2px 2px 0px var(--border);
      --shadow-lg: 6px 6px 0px var(--border);
      --radius: 14px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --error: #FF4757;
      --warning: #F5C535;
      --success: #22C55E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; touch-action: manipulation; }
    @media (max-width: 768px) { html { font-size: 15px; } }
    @media (max-width: 480px) { html { font-size: 14px; } }

    body {
      background: #FFFFFF;
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      transition: var(--transition);
      border: 3px solid var(--border);
      padding-top: 60px;
      font-family: 'Poppins', sans-serif;
      position: relative;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }
    @media (min-width: 769px) {
      body {
        background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
        background-size: 28px 28px;
        border-width: 6px;
        padding-top: 80px;
      }
    }
    @media (max-width: 768px) { body { border-width: 3px; } }
    @media (max-width: 480px) { body { border-width: 2px; } }

    /* ==================== ANIMATIONS ==================== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0%   { opacity: 0; transform: scale(0.75); }
      70%  { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
    @keyframes navbarIn {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.35); }
      50%       { box-shadow: 0 0 0 10px rgba(37,99,235,0); }
    }
    @keyframes successPop {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    .ripple-effect {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      width: 10px; height: 10px;
      pointer-events: none; transform: scale(0);
      animation: ripple 0.55s linear;
    }

    /* ==================== NAVBAR ==================== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      background: #FFFFFF;
      border-bottom: 3px solid var(--border);
      z-index: 1000; height: 60px; display: flex; align-items: center;
      box-shadow: 0 3px 0px var(--border); transition: var(--transition);
      animation: navbarIn 0.4s ease both;
    }
    @media (min-width: 769px) { .navbar { height: 80px; border-bottom-width: 4px; } }
    @media (max-width: 480px) { .navbar { height: 55px; border-bottom-width: 2px; } }

    .nav-container {
      width: 100%; max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
    }

    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; flex-shrink: 0; }
    .logo-image-container {
      position: relative; width: 40px; height: 40px;
      border: 2px solid var(--border); box-shadow: var(--shadow-sm);
      transform: rotate(-5deg); transition: var(--transition);
      overflow: hidden; background: var(--blue); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-image-container:hover { transform: rotate(0deg); }
    @media (min-width: 769px) { .logo-image-container { width: 50px; height: 50px; border-width: 3px; } }
    .logo-image { width: 100%; height: 100%; object-fit: cover; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-main {
      font-size: 1.2rem; font-weight: 900; color: var(--border); line-height: 1;
      letter-spacing: -0.5px; font-family: 'Cabinet Grotesk', 'Space Grotesk', sans-serif;
    }
    .logo-main span { color: var(--accent); }
    .logo-sub { font-size: 0.6rem; font-weight: 700; letter-spacing: 2px; margin-top: 2px; color: var(--blue-dark); text-transform: uppercase; }

    /* ==================== MAIN CONTAINER ==================== */
    .main-container {
      max-width: 760px; margin: 36px auto; padding: 0 15px;
      animation: fadeInUp 0.5s ease both 0.05s;
    }
    @media (max-width: 480px) { .main-container { margin: 20px auto; } }

    /* ==================== PAGE HEADER ==================== */
    .page-header {
      text-align: center; margin-bottom: 2rem;
      animation: fadeInUp 0.5s ease both 0.1s;
    }
    .page-header h1 {
      font-size: 2rem; font-weight: 900; color: var(--text-dark);
      font-family: 'Cabinet Grotesk', 'Space Grotesk', sans-serif;
      letter-spacing: -0.5px; margin-bottom: 0.4rem;
    }
    @media (max-width: 480px) { .page-header h1 { font-size: 1.5rem; } }
    .page-header p { color: var(--text-light); font-size: 0.9rem; }

    /* ==================== STATUS BADGE ==================== */
    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 0.5rem 1.25rem; border-radius: 50px;
      font-weight: 700; font-size: 0.85rem; margin-bottom: 1.5rem;
      border: 2.5px solid var(--warning); background: rgba(245,197,53,0.1);
      color: #a16207; box-shadow: var(--shadow-sm);
      font-family: 'Space Grotesk', sans-serif;
    }
    .status-badge i { animation: spin 2s linear infinite; }

    /* ==================== SECTION CARDS ==================== */
    .section-card {
      background: var(--light); border: 2.5px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm);
      transition: var(--transition); animation: fadeInUp 0.5s ease both;
    }
    .section-card:hover { transform: translate(-3px,-3px); box-shadow: var(--shadow); }

    .section-header {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
      padding-bottom: 1rem; border-bottom: 2px solid var(--border);
    }
    .step-badge {
      background: var(--blue); color: white; width: 32px; height: 32px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-weight: 800; border: 2px solid var(--border); flex-shrink: 0;
      font-family: 'Space Grotesk', sans-serif; box-shadow: var(--shadow-sm);
    }
    .section-header h2 {
      font-size: 1.15rem; font-weight: 800; color: var(--text-dark);
      font-family: 'Space Grotesk', sans-serif;
    }

    /* ==================== ORDER ID ==================== */
    .order-id-section {
      background: var(--light-gray); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem; text-align: center;
    }
    .order-id-value {
      font-family: 'DM Mono', monospace; font-size: 1.5rem; font-weight: 700;
      color: var(--blue); letter-spacing: 2px;
      animation: popIn 0.5s ease both 0.2s;
    }
    @media (max-width: 480px) { .order-id-value { font-size: 1.1rem; letter-spacing: 1px; } }

    /* ==================== INFO ROWS ==================== */
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 0; border-bottom: 1px dashed var(--gray);
      gap: 1rem;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--text-light); font-size: 0.9rem; flex-shrink: 0; }
    .info-value { color: var(--text-dark); font-weight: 700; text-align: right; word-break: break-all; }

    /* ==================== PRICE BREAKDOWN ==================== */
    .price-breakdown {
      background: var(--light-gray); border: 2px dashed var(--blue);
      border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .price-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0; font-size: 0.95rem;
    }
    .price-item.total {
      border-top: 2.5px solid var(--border); margin-top: 0.75rem;
      padding-top: 1rem;
    }
    .total-value {
      font-size: 1.6rem; font-weight: 900; color: var(--blue);
      font-family: 'DM Mono', monospace;
      animation: popIn 0.5s ease both 0.3s;
    }

    /* ==================== BUTTONS ==================== */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 1rem; border: 2.5px solid var(--border); border-radius: 50px;
      font-weight: 800; font-size: 1rem; cursor: pointer; transition: var(--transition);
      text-decoration: none; width: 100%; margin-top: 1rem;
      font-family: 'Space Grotesk', sans-serif; box-shadow: var(--shadow-sm);
      position: relative; overflow: hidden;
    }
    .btn-primary {
      background: var(--blue); color: white;
    }
    .btn-primary:hover { background: var(--blue-dark); transform: translate(-3px,-3px); box-shadow: var(--shadow-lg); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; box-shadow: var(--shadow-sm) !important; }
    .btn-primary.pulsing { animation: pulse 2s infinite; }
    .btn-secondary { background: var(--light); color: var(--text-dark); }
    .btn-secondary:hover { background: var(--light-gray); transform: translate(-2px,-2px); box-shadow: var(--shadow); }

    /* ==================== PAYMENT NOTICE ==================== */
    .payment-notice {
      margin-top: 1.5rem; padding: 1rem;
      background: rgba(37,99,235,0.05);
      border: 2px solid rgba(37,99,235,0.2); border-radius: 12px;
      font-size: 0.85rem; text-align: center; color: var(--text-light);
      line-height: 1.6;
    }
    .payment-notice i { color: var(--blue); }

    /* ==================== EMPTY STATE ==================== */
    .empty-state {
      text-align: center; padding: 4rem 2rem;
      animation: fadeInUp 0.5s ease both;
    }
    .empty-state-icon {
      width: 80px; height: 80px; border-radius: 50%; background: rgba(255,71,87,0.1);
      border: 3px solid var(--error); display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 2rem; color: var(--error);
      animation: popIn 0.5s ease both 0.1s;
    }
    .empty-state h2 { font-family: 'Space Grotesk', sans-serif; font-weight: 900; margin-bottom: 0.5rem; }
    .empty-state p { color: var(--text-light); margin-bottom: 1.5rem; }

    /* ==================== FOOTER ==================== */
    .footer {
      background: #1E293B; border-top: 3px solid var(--border);
      padding: 28px 20px; margin-top: 40px;
    }
    @media (min-width: 769px) { .footer { border-top-width: 4px; } }
    .footer-bottom { text-align: center; color: rgba(255,255,255,0.5); font-size: 0.75rem; }

    @media (hover: none) and (pointer: coarse) {
      .section-card:hover { transform: none !important; }
    }

    @supports (padding: max(0px)) {
      body { padding-top: calc(60px + env(safe-area-inset-top)); }
      .navbar { height: calc(60px + env(safe-area-inset-top)); padding-top: env(safe-area-inset-top); }
      @media (min-width: 769px) {
        body { padding-top: calc(80px + env(safe-area-inset-top)); }
        .navbar { height: calc(80px + env(safe-area-inset-top)); }
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">

    const SUPABASE_URL = 'https://bctssploewjorllwpwkx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjdHNzcGxvZXdqb3JsbHdwd2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NjE2OTcsImV4cCI6MjA5MjQzNzY5N30.ZmCFZMNQKV-sDsNk41ueg23FvM4W21xmIWvzpoThJAs';
    let supabaseClient = null;
    try { supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

    // ==================== REVEAL ON SCROLL ====================
    function initReveal() {
      var els = document.querySelectorAll('.reveal');
      var io = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
      }, { threshold: 0.1 });
      els.forEach(function(el) { io.observe(el); });
    }

    // ==================== RIPPLE ====================
    function addRipple(el) {
      if (!el) return;
      el.style.position = 'relative';
      el.style.overflow = 'hidden';
      el.addEventListener('click', function(e) {
        var r = document.createElement('span');
        r.className = 'ripple-effect';
        var rect = el.getBoundingClientRect();
        r.style.left = (e.clientX - rect.left - 5) + 'px';
        r.style.top  = (e.clientY - rect.top - 5) + 'px';
        el.appendChild(r);
        setTimeout(function() { r.remove(); }, 600);
      });
    }

    // ==================== TELEGRAM ====================
    async function sendTelegramNotification(orderData) {
      var botToken = '8298329168:AAHkncNR2LwSgqiNaA-KfwyyS-7JRf1GgCY';
      var chatId = '7604853514';
      var message = '<b>🔔 PESANAN BARU MASUK (PENDING) 🔔</b>\n\n🆔 Order ID: <code>' + orderData.order_id + '</code>\n📦 Produk: <b>' + orderData.product + '</b>\n💰 Total: <b>Rp ' + parseInt(orderData.amount).toLocaleString('id-ID') + '</b>\n📱 WhatsApp: ' + (orderData.wa || 'Tidak ada') + '\n⏰ Waktu: ' + new Date().toLocaleString('id-ID') + '\n\n🔗 Link Bayar:\n<code>https://app.pakasir.com/pay/givastore/' + orderData.amount + '?order_id=' + orderData.order_id + '&redirect=https://givastore.biz.id/success</code>';
      try {
        await fetch('https://api.telegram.org/bot' + botToken + '/sendMessage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'HTML' })
        });
      } catch(err) { console.error('Telegram error:', err); }
    }

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('currentYear').textContent = new Date().getFullYear();
      var mainContainer = document.getElementById('mainContainer');

      function clearContainer(el) { while (el.firstChild) el.removeChild(el.firstChild); }

      var urlParams = new URLSearchParams(window.location.search);
      var orderId     = urlParams.get('order_id');
      var productName = urlParams.get('product');
      var amount      = urlParams.get('amount');
      var waNumber    = urlParams.get('wa');

      var savedData = localStorage.getItem('ProductOrderData');
      var finalOrderData = null;

      if (savedData) {
        finalOrderData = JSON.parse(savedData);
      } else if (orderId && productName && amount) {
        finalOrderData = {
          order_id: orderId, product: productName, total: parseInt(amount),
          fullWhatsapp: waNumber || '', quantity: 1, price: parseInt(amount), accountData: {}
        };
      }

      if (finalOrderData) {
        displayOrderConfirmation(finalOrderData);
      } else {
        displayEmptyState();
      }

      function displayOrderConfirmation(order) {
        var pakasirUrl = 'https://app.pakasir.com/pay/givastore/' + order.total + '?order_id=' + order.order_id + '&redirect=https://givastore.biz.id/success';
        clearContainer(mainContainer);

        var accountRows = '';
        var entries = Object.entries(order.accountData || {});
        entries.forEach(function(pair) {
          accountRows += '<div class="info-row"><span class="info-label">' + pair[0].toUpperCase() + '</span><span class="info-value">' + pair[1] + '</span></div>';
        });

        mainContainer.innerHTML =
          '<div class="page-header">' +
            '<h1>Konfirmasi Pesanan</h1>' +
            '<p>Periksa detail pesanan sebelum membayar</p>' +
          '</div>' +
          '<div style="text-align:center;">' +
            '<div class="status-badge"><i class="fas fa-clock"></i> Menunggu Pembayaran</div>' +
          '</div>' +

          '<div class="section-card reveal" style="animation-delay:0.05s;">' +
            '<div class="section-header"><div class="step-badge">1</div><h2>ID Pesanan</h2></div>' +
            '<div class="order-id-section">' +
              '<div class="order-id-value">' + order.order_id + '</div>' +
              '<p style="font-size:0.8rem;color:var(--text-light);margin-top:8px;font-weight:600;">Simpan ID ini untuk melacak pesanan Anda</p>' +
            '</div>' +
          '</div>' +

          '<div class="section-card reveal" style="animation-delay:0.12s;">' +
            '<div class="section-header"><div class="step-badge">2</div><h2>Detail Produk</h2></div>' +
            '<div class="info-row"><span class="info-label">Nama Produk</span><span class="info-value">' + order.product + '</span></div>' +
            '<div class="info-row"><span class="info-label">Pilihan Paket</span><span class="info-value">' + (order.package || '-') + '</span></div>' +
            '<div class="info-row"><span class="info-label">Jumlah</span><span class="info-value">' + (order.quantity || 1) + ' Pcs</span></div>' +
          '</div>' +

          '<div class="section-card reveal" style="animation-delay:0.19s;">' +
            '<div class="section-header"><div class="step-badge">3</div><h2>Data Penerima</h2></div>' +
            '<div class="info-row"><span class="info-label">No. WhatsApp</span><span class="info-value">' + (order.fullWhatsapp || '-') + '</span></div>' +
            accountRows +
          '</div>' +

          '<div class="section-card reveal" style="animation-delay:0.26s;">' +
            '<div class="section-header"><div class="step-badge">4</div><h2>Rincian Biaya</h2></div>' +
            '<div class="price-breakdown">' +
              '<div class="price-item"><span>Harga Paket</span><span>Rp ' + ((order.price || 0) * (order.quantity || 1)).toLocaleString('id-ID') + '</span></div>' +
              '<div class="price-item total"><strong>Total Pembayaran</strong><span class="total-value">Rp ' + order.total.toLocaleString('id-ID') + '</span></div>' +
            '</div>' +
            '<button class="btn btn-primary pulsing" id="btn-pay-now"><i class="fas fa-credit-card"></i> Bayar Sekarang</button>' +
            '<a href="../index.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Kembali ke Toko</a>' +
            '<div class="payment-notice"><p><i class="fas fa-info-circle"></i> Setelah menekan <b>Bayar Sekarang</b>, Anda akan dialihkan ke gerbang pembayaran aman Pakasir.</p></div>' +
          '</div>';

        initReveal();
        addRipple(document.getElementById('btn-pay-now'));
        addRipple(document.querySelector('.btn-secondary'));

        document.getElementById('btn-pay-now').addEventListener('click', async function() {
          var btn = document.getElementById('btn-pay-now');
          btn.innerHTML = '<div style="width:20px;height:20px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;"></div> Memproses Pesanan...';
          btn.disabled = true;
          btn.classList.remove('pulsing');

          try {
            if (supabaseClient) {
              var dbResult = await supabaseClient.from('orders').insert([{
                order_id: order.order_id,
                product_name: order.product,
                package_name: order.package || order.product,
                price: order.price,
                quantity: order.quantity || 1,
                total_amount: order.total,
                customer_whatsapp: order.fullWhatsapp,
                account_data: order.accountData || {},
                payment_method: 'Pakasir QRIS',
                status: 'pending'
              }]);
              if (dbResult.error) throw dbResult.error;
            }
            await sendTelegramNotification({ order_id: order.order_id, product: order.product, amount: order.total, wa: order.fullWhatsapp });
            localStorage.removeItem('ProductOrderData');
            window.location.href = pakasirUrl;
          } catch(err) {
            console.error('Gagal memproses pembayaran:', err);
            localStorage.removeItem('ProductOrderData');
            window.location.href = pakasirUrl;
          }
        });
      }

      function displayEmptyState() {
        clearContainer(mainContainer);
        mainContainer.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-state-icon"><i class="fas fa-exclamation-triangle"></i></div>' +
            '<h2>Pesanan Tidak Ditemukan</h2>' +
            '<p>Silakan pilih produk terlebih dahulu sebelum melakukan pembayaran.</p>' +
            '<a href="../index.html" class="btn btn-primary" style="max-width:280px;margin:0 auto;"><i class="fas fa-shopping-bag"></i> Pilih Produk</a>' +
          '</div>';
        addRipple(mainContainer.querySelector('.btn-primary'));
      }
    });
  </script>
</body>
</html>
