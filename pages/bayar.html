  if (!m) return '';
  if (m.type === 'qris') return '0,7%+Rp310 (>Rp105rb: 1%)';
  return 'Admin '+(m.type==='va_low'?'Rp 2.000':'Rp 3.500');
}

function ts(s) { if(s<=0)return'00:00'; return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

async function sendTG(msg) {

function addRipple(el) {
  if (!el) return;
  el.addEventListener('click', function(e) {
    var r = document.createElement('span'); r.className='ripple-effect';
    var rect = el.getBoundingClientRect();
    r.style.left=(e.clientX-rect.left-5)+'px'; r.style.top=(e.clientY-rect.top-5)+'px';
    el.appendChild(r); setTimeout(()=>r.remove(), 600);
  });
}

function initReveal() {
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){ if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);} });
  },{threshold:.1});
  document.querySelectorAll('.reveal').forEach(function(el){io.observe(el);});
}

function pickMethod(id) {
  const m = METHODS.find(x=>x.id===id);

  selMeth = m;

  document.getElementById('feeSubtotal').textContent = rp(order.total);
  document.getElementById('feeFee').textContent = '+'+rp(fee);

async function doCreate() {
  if (!selMeth) return;
  const btn = document.getElementById('btnPay');
  btn.disabled = true; btn.classList.remove('pulsing');
  btn.innerHTML = '<div style="width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite"></div> Memproses...';

  try {
    const res = await fetch('/api/pakasir?path=transactioncreate/'+selMeth.id, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ project:CFG.project, order_id:order.order_id, amount:order.total, api_key:CFG.apiKey })
    });

    let body;
    try { body = await res.json(); } catch(e) { throw new Error('Response tidak valid ('+res.status+')'); }
    if (!res.ok) throw new Error(body?.message || body?.error || 'HTTP '+res.status);
    if (!body.payment) throw new Error('Field payment tidak ada di response');

    txn = body.payment;
    totalExpSec = Math.max(0, Math.floor((new Date(txn.expired_at) - Date.now()) / 1000));

    if (supa) {
      try {
        await supa.from('orders').upsert([{
          order_id:order.order_id, product_name:order.product,
          package_name:order.package||order.product,
          price:order.price, quantity:order.quantity||1,
          total_amount:order.total, fee_amount:txn.fee||0,
          total_payment:txn.total_payment, customer_whatsapp:order.fullWhatsapp,
          account_data:order.accountData||{}, payment_method:selMeth.id, status:'pending'
        }]);
      } catch(e) { console.warn('Supabase:', e); }
    }

    const {fee} = calcFee(selMeth, order.total);
    await sendTG('🔔 <b>PEMBAYARAN DIBUAT</b>\n\n🆔 Order: <code>'+order.order_id+'</code>\n📦 Produk: <b>'+order.product+'</b>\n💰 Total: <b>'+rp(txn.total_payment)+'</b>\n💳 Metode: '+selMeth.name+'\n📱 WA: '+(order.fullWhatsapp||'-')+'\n⏰ '+new Date().toLocaleString('id-ID'));

    // Simpan state pembayaran ke sessionStorage agar tidak hilang saat refresh
    try {
      sessionStorage.setItem('PaymentStep', JSON.stringify({
        order: order,
        txn: body.payment,
        method: selMeth.id
      }));
    } catch(e) {}

    localStorage.removeItem('ProductOrderData');
    renderPayScreen();

  } catch(err) {
    console.error('doCreate:', err);
    // Tampilkan pesan error
    const errBox = document.createElement('div');
    errBox.style.cssText = 'background:rgba(255,71,87,.1);border:2px solid var(--error);border-radius:12px;padding:12px 16px;margin-top:12px;font-size:.85rem;color:var(--error);font-weight:600;';
    errBox.innerHTML = '<i class="fas fa-exclamation-circle"></i> '+err.message;
    const card = document.querySelector('.section-card:last-child');
    if (card) card.appendChild(errBox);
    btn.disabled = false; btn.classList.add('pulsing');
    const {total} = calcFee(selMeth, order.total);
    btn.innerHTML = '<i class="fas fa-credit-card"></i> Bayar '+rp(total)+' via '+selMeth.name;
  }
}

// ════════════════════════════════════
// COUNTDOWN
// ════════════════════════════════════
function startCd(sec) {
  stopCd();
  var rem = sec;
  cdId = setInterval(function() {
    rem--;
    var el = document.getElementById('cdTime');
    var bar = document.getElementById('cdBar');
    if (!el) { stopCd(); return; }
    el.textContent = ts(rem);
    el.className = 'cd-time'+(rem<=60?' urgent':'');
    if (bar && totalExpSec>0) {
      bar.style.width = Math.max(0, rem/totalExpSec*100)+'%';
      bar.className = 'cd-bar'+(rem<=60?' urgent':'');
    }
    if (rem <= 0) { stopCd(); stopPoll(); el.textContent='KEDALUWARSA'; }
  }, 1000);
}
function stopCd() { if(cdId){clearInterval(cdId);cdId=null;} }

// ════════════════════════════════════
// POLLING — exponential backoff, pause saat tab hidden
// ════════════════════════════════════
var pollDelay  = 5000;   // mulai 5 detik
var pollTimer  = null;
var pollPaused = false;

function startPoll() {
  stopPoll();
  pollDelay = 5000;
  schedulePoll();
  // Pause saat tab tidak aktif, lanjut saat kembali
  document.addEventListener('visibilitychange', onVisibility);
}

function stopPoll() {
  if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  document.removeEventListener('visibilitychange', onVisibility);
}

function onVisibility() {
  if (document.hidden) {
    if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; pollPaused = true; }
  } else if (pollPaused) {
    pollPaused = false;
    // Langsung cek sekali saat kembali ke tab, lalu jadwalkan ulang
    checkStatus();
  }
}

function schedulePoll() {
  if (payDone || !txn || !order) return;
  pollTimer = setTimeout(checkStatus, pollDelay);
}

async function checkStatus() {
  if (payDone || !txn || !order) { stopPoll(); return; }
  try {
    var res = await fetch('/api/pakasir?path=transactiondetail&project='+CFG.project+'&amount='+order.total+'&order_id='+order.order_id+'&api_key='+CFG.apiKey);

    // 429 Too Many Requests → backoff lebih lama
    if (res.status === 429) {
      pollDelay = Math.min(pollDelay * 2, 60000);
      schedulePoll();
      return;
    }
    if (!res.ok) { schedulePoll(); return; }

    var data = await res.json();

    // Reset delay ke normal setelah berhasil
    pollDelay = Math.min(Math.max(pollDelay, 5000), 15000);

    if (data && data.transaction && data.transaction.status === 'completed') {
      payDone = true;
      stopPoll(); stopCd();

      var badge = document.getElementById('statusBadge');
      if (badge) { badge.className='status-badge success'; badge.innerHTML='<i class="fas fa-check-circle"></i> Pembayaran Diterima!'; }
      var pill = document.getElementById('payStatusPill');
      if (pill) { pill.className='pay-status-pill pill-success'; pill.innerHTML='<i class="fas fa-check-circle"></i> Lunas!'; }

      if (supa) { try { await supa.from('orders').update({status:'completed'}).eq('order_id',order.order_id); } catch(e){} }
      await sendTG('✅ <b>PEMBAYARAN BERHASIL</b>\n\n🆔 Order: <code>'+order.order_id+'</code>\n📦 Produk: <b>'+order.product+'</b>\n💰 Total: <b>'+rp(txn.total_payment)+'</b>\n💳 Metode: '+selMeth.name+'\n📱 WA: '+(order.fullWhatsapp||'-')+'\n⏰ '+new Date().toLocaleString('id-ID'));

      try {
        sessionStorage.setItem('SuccessData', JSON.stringify({
          order_id:order.order_id, product:order.product,
          total:txn.total_payment, method:selMeth.name, wa:order.fullWhatsapp||''
        }));
      } catch(e){}

      try { sessionStorage.removeItem('PaymentStep'); } catch(e) {}

      var url = CFG.successUrl
        +'?order_id='+encodeURIComponent(order.order_id)
        +'&product='+encodeURIComponent(order.product)
        +'&total='+txn.total_payment
        +'&method='+encodeURIComponent(selMeth.name)
        +'&wa='+encodeURIComponent(order.fullWhatsapp||'');
      setTimeout(function(){ window.location.replace(url); }, 1500);
      return;
    }

    // Belum lunas — naikkan interval perlahan sampai max 15 detik
    pollDelay = Math.min(pollDelay + 1000, 15000);
    schedulePoll();

  } catch(e) {
    // Network error — coba lagi dengan delay lebih lama
    pollDelay = Math.min(pollDelay * 2, 30000);
    schedulePoll();
  }
}

// ════════════════════════════════════
// COPY VA
// ════════════════════════════════════
function copyVA() {
  var num = document.getElementById('vaNum');
  var btn = document.getElementById('copyBtn');
  if (!num) return;
  var text = num.textContent.trim();
  function ok() {
    if(btn){btn.className='copy-btn copied';btn.innerHTML='<i class="fas fa-check"></i> Tersalin!';}
    setTimeout(function(){if(btn){btn.className='copy-btn';btn.innerHTML='<i class="fas fa-copy"></i> Salin Nomor';}},2500);
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(ok).catch(function(){
      var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();
    });
  } else {
    var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);ok();
  }
}

// ════════════════════════════════════
// CANCEL
// ════════════════════════════════════
async function doCancel() {
  if (!confirm('Yakin ingin membatalkan transaksi ini?')) return;
  var btn = document.getElementById('btnCancel');
  if (btn) { btn.disabled=true; btn.innerHTML='<div style="width:18px;height:18px;border:2px solid rgba(255,71,87,.3);border-top-color:var(--error);border-radius:50%;animation:spin .8s linear infinite"></div> Membatalkan...'; }
  stopPoll(); stopCd();
  try {
    await fetch('/api/pakasir?path=transactioncancel', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({project:CFG.project,order_id:order.order_id,amount:order.total,api_key:CFG.apiKey})
    });
  } catch(e){}
  if (supa) { try { await supa.from('orders').update({status:'cancelled'}).eq('order_id',order.order_id); }catch(e){} }
  await sendTG('❌ <b>TRANSAKSI DIBATALKAN</b>\n\n🆔 Order: <code>'+order.order_id+'</code>\n📦 '+order.product+'\n💰 '+rp(order.total));
  try { sessionStorage.removeItem('PaymentStep'); } catch(e) {}
  txn=null; selMeth=null;
  renderStep1();
}
